############################## ANIMATIONS ##############################
{
    match = "window_type = 'normal'"
        "&& !class_g = 'i3lock'"
        "&& !class_g = 'qs-topbar'"
        "&& !class_g = 'qs-border'"
        "&& !class_g = 'qs-powermenu'"
        "&& !class_g = 'qs-notify'"
        "&& !class_g = 'quickshell'";
    animations = (
        {
            # Animate when a window is closed or hidden
            triggers = ["close"];
        
            # Fade out opacity
            opacity = {
                curve = "cubic-bezier(0,1,1,1)";
                duration = 0.3;
                start = "window-raw-opacity-before";  # opacity before closing
                end = 0;                              # fully transparent
            };
        
            # Also fade blur and shadow
            blur-opacity = "opacity";
            shadow-opacity = "opacity";
        
            # Scale the window down slightly
            scale-x = {
                curve = "cubic-bezier(0,1.3,1,1)";
                duration = 0.3;
                start = 1;    # original size
                end = 0.6;    # shrink to 60%
            };
            scale-y = "scale-x";
        
            # Center the animation by offsetting as it scales
            offset-x = "(1 - scale-x) / 2 * window-width";
            offset-y = "(1 - scale-y) / 2 * window-height";
        
            # Also scale the shadow along with the window
            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        },
        {
            triggers = ["open"];
            opacity = {
                curve = "cubic-bezier(0,1,1,1)";
                duration = 0.5;
                start = 0;
                end = "window-raw-opacity";
            };
            blur-opacity = "opacity";
            shadow-opacity = "opacity";

            scale-x = {
                curve = "cubic-bezier(0,1.3,1,1)";
                duration = 0.5;
                start = 0.6;
                end = 1;
            };
            scale-y = "scale-x";

            offset-x = "(1 - scale-x) / 2 * window-width";
            offset-y = "(1 - scale-y) / 2 * window-height";

            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        },

        {
            triggers = ["geometry"];
            scale-x = {
                curve = "cubic-bezier(0,0,0,1.28)";
                duration = 0.5;
                start = "window-width-before / window-width";
                end = 1;
            };

            scale-x-reverse = {
                curve = "cubic-bezier(0,0,0,1.28)";
                duration = 0.3;
                start = "window-width / window-width-before";
                end = 1;
            };
            scale-y = {
                curve = "cubic-bezier(0,0,0,1.28)";
                duration = 0.5;
                start = "window-height-before / window-height";
                end = 1;
            };
            scale-y-reverse = {
                curve = "cubic-bezier(0,0,0,1.28)";
                duration = 0.3;
                start = "window-height / window-height-before";
                end = 1;
            };
            offset-x = {
                curve = "cubic-bezier(0,0,0,1.28)";
                duration = 0.5;
                start = "window-x-before - window-x";
                end = 0;
            };
            offset-y = {
                curve = "cubic-bezier(0,0,0,1.28)";
                duration = 0.5;
                start = "window-y-before - window-y";
                end = 0;
            };
            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        }
    )
},


# Animations for Dunst notifications.
{
	match = "class_g = 'Dunst'";
	animations = (
	{
		triggers = ["close", "hide"];
		preset = "fly-out";	#-dunst-close-preset
		direction = "up";	#-dunst-close-direction
		duration = 0.2;
	},
	{
		triggers = ["open", "show"];
		preset = "fly-in";	#-dunst-open-preset
		direction = "up";	#-dunst-open-direction
		duration = 0.2;
	}
	)
},

# Animations for Jgmenu.
{
	match = "class_g = 'jgmenu'";
	animations = (
	{
		triggers = ["close", "hide"];
		preset = "disappear";
		duration = 0.08;
		scale = 0.5;
	},
	{
		triggers = ["open", "show"];
		preset = "appear";
		duration = 0.15;
		scale = 0.5;
	}
	)
},

# Slide-up open / slide-down close for specific classes
{
    match = "class_g = 'ty-wall' || class_g = 'toml-gui' || class_g = 'vicinae'";
    animations = (
        {
            triggers = ["open", "show"];
            preset = "slide-in";
            direction = "down";
            duration = 0.15;
        },
        {
            triggers = ["close", "hide"];
            preset = "slide-out";
            direction = "down";
            duration = 0.15;
        }
    )
},

