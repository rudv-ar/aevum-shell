[config]
name = "PICOM"
root = "$HOME/.config/picom"
path = "$HOME/.config/picom/picom-settings.sh"
desc = "RUDV-AR picom compositor config"


################### SHADOWS #########################
[config.shadows]
enabled  = true
radius   = 20
opacity  = 1.0
offset_x = -20
offset_y = -20
color    = "#000000"

[config.shadows._rules]
radius.range   = { lower = 0,   upper = 60  }
radius.unit    = "px"
radius.desc    = "Shadow blur radius"
opacity.range  = { lower = 0.0, upper = 1.0 }
opacity.step   = 0.05
offset_x.range = { lower = -50, upper = 0   }
offset_x.unit  = "px"
offset_y.range = { lower = -50, upper = 0   }
offset_y.unit  = "px"
color.kind     = "color"
color.desc     = "Shadow color"

################### BLUR ############################
[config.blur]
enabled   = false
method    = "gaussian"
size      = 5.0
deviation = 5.0
strength  = 5.0
bg_frame  = false
bg_fixed  = false

[config.blur._rules]
method.enum     = ["none", "gaussian", "box", "kernel", "dual_kawase"]
method.desc     = "Blur algorithm"
size.range      = { lower = 1.0, upper = 20.0 }
size.step       = 0.5
deviation.range = { lower = 0.0, upper = 20.0 }
deviation.step  = 0.5
strength.range  = { lower = 1.0, upper = 20.0 }
strength.step   = 0.5
bg_frame.label  = "Background frame"
bg_frame.desc   = "Blur background of frames"
bg_fixed.label  = "Background fixed"
bg_fixed.desc   = "Fixed blur background"

################### FADING ##########################
[config.fading]
enabled             = true
in_step             = 0.1
out_step            = 0.1
delta               = 1.0
no_fading_openclose = false
no_fading_destroyed = true

[config.fading._rules]
in_step.range             = { lower = 0.01, upper = 0.30 }
in_step.step              = 0.01
in_step.label             = "Fade in step"
out_step.range            = { lower = 0.01, upper = 0.30 }
out_step.step             = 0.01
out_step.label            = "Fade out step"
delta.range               = { lower = 0.5,  upper = 10.0 }
delta.step                = 0.5
delta.desc                = "Time between fade steps (ms)"
no_fading_openclose.label = "No fade open/close"
no_fading_destroyed.label = "No fade destroyed ARGB"

################### CORNERS #########################
[config.corners]
radius = 5

[config.corners._rules]
radius.range = { lower = 0, upper = 24 }
radius.unit  = "px"
radius.desc  = "Window corner rounding radius"

################### WINDOW RULES ####################
[config.rules]
term_opacity    = 0.98
scratch_opacity = 0.93
tooltip_opacity = 0.9

[config.rules._rules]
term_opacity.range    = { lower = 0.5, upper = 1.0 }
term_opacity.step     = 0.01
term_opacity.label    = "Terminal opacity"
term_opacity.desc     = "alacritty, kitty, st, vicinae"
scratch_opacity.range = { lower = 0.5, upper = 1.0 }
scratch_opacity.step  = 0.01
scratch_opacity.label = "Scratch opacity"
tooltip_opacity.range = { lower = 0.5, upper = 1.0 }
tooltip_opacity.step  = 0.01
tooltip_opacity.label = "Tooltip opacity"

################### GENERAL #########################
[config.general]
backend                = "xrender"
vsync                  = true
dithered_present       = false
use_damage             = true
detect_rounded_corners = true
detect_client_opacity  = true
detect_transient       = true
log_level              = "warn"

[config.general._rules]
backend.enum                 = ["xrender", "glx", "egl", "xr_glx_hybrid"]
backend.desc                 = "Rendering backend"
log_level.enum               = ["trace", "debug", "info", "warn", "error"]
log_level.label              = "Log level"
vsync.desc                   = "Vertical sync"
use_damage.label             = "Use damage"
use_damage.desc              = "Repaint only damaged regions"
dithered_present.label       = "Dithered present"
detect_rounded_corners.label = "Detect rounded corners"
detect_client_opacity.label  = "Detect client opacity"
detect_transient.label       = "Detect transient"
