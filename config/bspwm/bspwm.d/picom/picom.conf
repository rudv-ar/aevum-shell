#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius   = 20;
shadow-opacity  = 1.0;
shadow-offset-x = -20;
shadow-offset-y = -15;
shadow-color    = "#000000";

#################################
#             Blur              #
#################################
blur-background       = false;
blur-method           = "none";
blur-size             = 5.0;
blur-deviation        = 5.0;
blur-strength         = 5.0;
blur-background-frame = false;
blur-background-fixed = false;

#################################
#             Fading            #
#################################
fading                   = true;
fade-in-step             = 0.1;
fade-out-step            = 0.1;
fade-delta               = 1.0;
no-fading-openclose      = false;
no-fading-destroyed-argb = false;

#################################
#             Corners           #
#################################
corner-radius = 5;

#################################
#       General Settings        #
#################################
backend                = "xrender";
vsync                  = true;
dithered-present       = false;
use-damage             = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
log-level              = "warn";

