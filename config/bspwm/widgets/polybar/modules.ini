;; The Modules for config 247 polybar

[module/xworkspaces]
;type = internal/bspwm
type = internal/xworkspaces

label-active = "󰝥"
label-active-foreground = ${colors.foreground}
label-active-padding = 2

label-occupied = "󰝥"
label-occupied-foreground = ${colors.white}
label-occupied-padding = 2

label-urgent = "󰝥"
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2

label-empty = "󰝥"
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/title]
type = internal/xwindow

format = <label>
;format-prefix = %{A1:OpenApps --vicinae-windows:} 󱂬 %{A}
;format-prefix-foreground = ${colors.foreground}
;format-prefix-background = ${colors.grey}

;label = %{A1:OpenApps --vicinae-windows:}%title:0:50%%{A}
label = %{A1:OpenApps --vicinae-windows:} 󱂬 %{A}
;label-empty = %{A1:OpenApps --vicinae-windows:}Your Mission : 2.47%{A}
label-empty = %{A1:OpenApps --vicinae-windows:}   %{A}

;label-background = ${colors.grey}

label-empty-foreground = ${colors.foreground}
;label-empty-background = ${colors.grey}

[module/seperator]
type = custom/text
content = " |  "
content-font = 0

[module/space]
type = custom/text
content = "  "
content-font = 0

[module/memory]
type = internal/memory
interval = 5

format = <label>
;format-background = ${color.BACKGROUND}
format-padding = 2

format-prefix = "  "
format-prefix-font = 7
format-prefix-foreground = ${color.CYAN}

label = " %gb_used%"


[module/cpu]
type = internal/cpu
interval = 5
format = <label>
format-prefix = "  "
format-prefix-font = 7
format-prefix-foreground = ${color.ACCENT}
;format-background = ${color.BACKGROUND}
format-padding = 1
label = " %percentage%%"


[module/filesystem]
type = internal/fs

; Mountpoints to display
;mount-0 = /
mount-1 = /home
;mount-2 = /sdisks/disk-a

; Seconds to sleep between updates
; Default: 30
interval = 10

; Display fixed precision values
; Default: false
fixed-values = true

; Spacing between entries
; Default: 2
;;spacing = 4

; Available tags:
;   <label-mounted> (default)
;   <bar-free>
;   <bar-used>
;   <ramp-capacity>
format-mounted = <label-mounted>
;format-mounted-background = ${color.BACKGROUND}
format-mounted-padding = 1

format-mounted-prefix = 󰋊
format-mounted-prefix-font = 7
format-mounted-prefix-foreground = ${colors.teal}

; Available tags:
;   <label-unmounted> (default)
format-unmounted = <label-unmounted>
;format-unmounted-background = ${color.BACKGROUND}
format-unmounted-padding = 1

format-unmounted-prefix = 󱁌
format-unmounted-prefix-font = 7
format-unmounted-prefix-foreground = ${color.RED}

; Available tokens:
;   %mountpoint%
;   %type%
;   %fsname%
;   %percentage_free%
;   %percentage_used%
;   %total%
;   %free%
;   %used%
; Default: %mountpoint% %percentage_free%%
label-mounted = " %percentage_used%%"

; Available tokens:
;   %mountpoint%
; Default: %mountpoint% is not mounted
label-unmounted = " %mountpoint%: NM"

[module/network]
type = internal/network
interface = wlan0

; Seconds to sleep between updates
; Default: 1
interval = 1.0

; Test connectivity every Nth update
; A value of 0 disables the feature
; NOTE: Experimental (needs more testing)
; Default: 0
;ping-interval = 3

; @deprecated: Define min width using token specifiers (%downspeed:min% and %upspeed:min%)
; Minimum output width of upload/download rate
; Default: 3
;;udspeed-minwidth = 5

; Accumulate values from all interfaces
; when querying for up/downspeed rate
; Default: false
accumulate-stats = true

; Consider an `UNKNOWN` interface state as up.
; Some devices have an unknown state, even when they're running
; Default: false
unknown-as-up = true

; Available tags:
;   <label-connected> (default)
;   <ramp-signal>
format-connected = <ramp-signal> <label-connected>
format-connected-padding = 1

; Available tags:
;   <label-disconnected> (default)

format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰤭 "
format-disconnected-prefix-font = 2
format-disconnected-foreground = ${color.ALTFOREGROUND}
format-disconnected-background = ${color.BACKGROUND}
format-disconnected-padding = 1

; Available tags:
;   <label-connected> (default)
;   <label-packetloss>
;   <animation-packetloss>
;;format-packetloss = <animation-packetloss> <label-connected>

; Available tokens:
;   %ifname%    [wireless+wired]
;   %local_ip%  [wireless+wired]
;   %local_ip6% [wireless+wired]
;   %essid%     [wireless]
;   %signal%    [wireless]
;   %upspeed%   [wireless+wired]
;   %downspeed% [wireless+wired]
;   %linkspeed% [wired]
; Default: %ifname% %local_ip%
;label-connected = "%essid%  %downspeed%"
label-connected = "%{A1:vicinae-wifi &:}%essid%%{A}"

; Available tokens:
;   %ifname%    [wireless+wired]
; Default: (none)
label-disconnected = "%{A1:vicinae-wifi &:}Offline%{A}"

; Available tokens:
;   %ifname%    [wireless+wired]
;   %local_ip%  [wireless+wired]
;   %local_ip6% [wireless+wired]
;   %essid%     [wireless]
;   %signal%    [wireless]
;   %upspeed%   [wireless+wired]
;   %downspeed% [wireless+wired]
;   %linkspeed% [wired]
; Default: (none)
;label-packetloss = %essid%
;label-packetloss-foreground = #eefafafa

; Only applies if <ramp-signal> is used
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨
ramp-signal-foreground = ${colors.bluegray}
ramp-signal-font = 2

; Only applies if <animation-packetloss> is used
;;animation-packetloss-0 = ⚠
;;animation-packetloss-0-foreground = #ffa64c
;;animation-packetloss-1 = ⚠
;;animation-packetloss-1-foreground = #000000
; Framerate in milliseconds
;;animation-packetloss-framerate = 500

[module/volume]
type = internal/pulseaudio

; Sink to be used, if it exists (find using `pacmd list-sinks`, name field)
; If not, uses default sink
sink =

; Use PA_VOLUME_UI_MAX (~153%) if true, or PA_VOLUME_NORM (100%) if false
; Default: true
use-ui-max = false

; Interval for volume increase/decrease (in percent points)
; Default: 5
interval = 5

; Available tags:
;   <label-volume> (default)
;   <ramp-volume>
;   <bar-volume>
format-volume = <bar-volume> <label-volume>
;format-volume-background = ${color.BACKGROUND}
format-volume-padding = 1
; Available tags:
;   <label-muted> (default)
;   <ramp-volume>
;   <bar-volume>
format-muted = <label-muted>
format-muted-prefix = 婢
format-muted-prefix-font = 2
format-muted-prefix-foreground = ${color.ALTFOREGROUND}
format-muted-background = ${color.BACKGROUND}
format-muted-padding = 1

; Available tokens:
;   %percentage% (default)
;label-volume = %percentage%%

; Available tokens:
;   %percentage% (default)
label-muted = " Mute"
label-muted-foreground = ${color.ALTFOREGROUND}

; Only applies if <bar-volume> is used
bar-volume-width = 5
bar-volume-gradient = false

bar-volume-indicator = ┫
bar-volume-indicator-font = 1
bar-volume-indicator-foreground = ${color.BLUE}

bar-volume-fill = ━
bar-volume-fill-font = 1
bar-volume-foreground-0 = ${color.BLUE}
bar-volume-foreground-1 = ${color.BLUE}
bar-volume-foreground-2 = ${color.BLUE}
bar-volume-foreground-3 = ${color.BLUE}
bar-volume-foreground-4 = ${color.BLUE}

bar-volume-empty = ╍
bar-volume-empty-font = 1
bar-volume-empty-foreground = ${color.ALTBACKGROUND}

; Only applies if <ramp-volume> is used
ramp-volume-0 = 奄
ramp-volume-1 = 奄
ramp-volume-2 = 奄
ramp-volume-3 = 奔
ramp-volume-4 = 奔
ramp-volume-5 = 奔
ramp-volume-6 = 墳
ramp-volume-7 = 墳
ramp-volume-8 = 墳
ramp-volume-9 = 墳
ramp-volume-font = 2
ramp-volume-foreground = ${color.BLUE}

[module/sysmenu]
type = custom/text

content = " "
content-font = 2
;content-background = ${color.ALTBACKGROUND}
content-foreground = ${color.RED}
content-padding = 0

click-left = systemctl poweroff
click-right = systemctl reboot

[module/date]
type = internal/date

; Seconds to sleep between updates
interval = 1.0

; See "http://en.cppreference.com/w/cpp/io/manip/put_time" for details on how to format the date string
; NOTE: if you want to use syntax tags here you need to use %%{...}
;;date = %Y-%m-%d%

; Optional time format
time = %I:%M %p

; if `date-alt` or `time-alt` is defined, clicking
; the module will toggle between formats
;;date-alt = %A, %d %B %Y
#time-alt = %d/%m/%Y%
time-alt = %A %b %d, %G

; Available tags:
;   <label> (default)

format = <label>
format-prefix = "󰥔 "
format-prefix-font = 2
format-prefix-foreground = ${color.RED}
;format-background = ${color.ALTBACKGROUND}

; Available tokens:
;   %date%
;   %time%
; Default: %date%
label = "%{A1:yad-cal :}%time%%{A}"
label-font = 5

[module/menu]
type = custom/text

content = " 󰣇 [rudv-ar] "
content-font = 3
;content-background = ${color.ALTBACKGROUND}
content-foreground = ${colors.foreground}
content-padding = 0

click-left = vicinae toggle


[module/mpd]
type = internal/mpd

; Host where mpd is running (either ip or domain name)
; Can also be the full path to a unix socket where mpd is running.
;;host = 127.0.0.1
;;port = 6600
;;password = mysecretpassword

; Seconds to sleep between progressbar/song timer sync
; Default: 1
interval = 2

; Available tags:
;   <label-song> (default)
;   <label-time>
;   <bar-progress>
;   <toggle> - gets replaced with <icon-(pause|play)>
;   <toggle-stop> - gets replaced with <icon-(stop|play)>
;   <icon-random>
;   <icon-repeat>
;   <icon-repeatone> (deprecated)
;   <icon-single> - Toggle playing only a single song. Replaces <icon-repeatone>
;   <icon-consume>
;   <icon-prev>
;   <icon-stop>
;   <icon-play>
;   <icon-pause>
;   <icon-next>
;   <icon-seekb>
;   <icon-seekf>

format-online = <toggle>
;;format-online-prefix = " "
;;format-online-prefix-font = 2
;;format-online-prefix-foreground = ${color.GREEN}
;format-online-background = ${color.ALTBACKGROUND}

format-playing = ${self.format-online}
format-paused = ${self.format-online}
format-stopped = ${self.format-online}

; Available tags:
;   <label-offline>
format-offline = <label-offline>
#format-offline-prefix = " "
;format-offline-background = ${color.ALTBACKGROUND}

; Available tokens:
;   %artist%
;   %album-artist%
;   %album%
;   %date%
;   %title%
; Default: %artist% - %title%
label-song =  "%artist% - %title%"
label-song-maxlen = 25
label-song-ellipsis = true

; Available tokens:
;   %elapsed%
;   %total%
; Default: %elapsed% / %total%
;;abel-time = %elapsed% / %total%

; Available tokens:
;   None
label-offline = ""

; Only applies if <icon-X> is used
icon-play = "  "
icon-play-font = 2
icon-play-foreground = ${color.GREEN}
icon-pause = "  "
icon-pause-font = 2
icon-pause-foreground = ${color.YELLOW}
icon-stop = "  "
icon-stop-foreground = ${color.RED}
icon-prev = 玲
icon-prev-font = 1
icon-prev-foreground = ${color.BLUE}
icon-next = 怜
icon-next-font = 1
icon-next-foreground = ${color.BLUE}

; Used to display the state of random/repeat/repeatone/single
; Only applies if <icon-[random|repeat|repeatone|single]> is used
;;toggle-on-foreground = #ff
;;toggle-off-foreground = #55

[module/clipboard]
type = custom/text
content = " 󰅎 "
content-padding = 1
content-foreground = ${colors.blue}
click-left = OpenApps --clipboard

[module/updates]
type = custom/script
exec = Updates --get-updates
interval = 30
label = " %output% "
;label-background = ${colors.background-alt}
click-left = OpenApps --update
click-right = OpenApps --checkupdates
format-prefix = " 󱍸 "
;format-prefix-background = ${colors.background-alt}

[module/mod]
type = internal/bspwm

format = <label-mode>
;format-background = ${colors.grey}
format-foreground = ${colors.foreground}
format-padding = 1
format-font = 1

label-monocle = "Monocle"
label-tiled = "Tiled"

label-floating = " | Float"
label-pseudotiled = " | Pseudo"
label-fullscreen = " | Full"

label-locked = " | Locked"
label-sticky = " | Sticky"
label-private = " | Private"

