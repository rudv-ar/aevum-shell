include-file = modules.ini
include-file = gylphs.ini
include-file = colors.ini
include-file = decor.ini

;; The bar showing the workspaces
[bar/work-bar]
width = 20%
height = 20
radius-bottom = 7
fixed-center = true
offset-x = 550
offset-y = -5

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-size = 7pt
border-color = ${colors.background}

padding = 2

module-margin-left = 0
module-margin-right = 0

font-0 = "Sofia Pro:size=12;3"
font-1 = "Material Design Icons Desktop:size=12;3"
font-2 = "JetBrainsMono Nerd Font:size=12;3"
font-3 = "Font Awesome 6 Free Solid:size=12;3"
font-4 = "Feather:style=Bold:size=11;3"
font-5 = "Symbols Nerd Font:size=20;4"
font-6 = "SymbolsNF:size=12;3"
font-10 = "Symbols Nerd Font:size=12;3"

modules-left =
modules-center = xworkspaces
modules-right =

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = bspwm


[settings]
screenchange-reload = true
pseudo-transparency = true

